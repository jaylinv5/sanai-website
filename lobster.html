<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🦞 龙虾接入直播系统</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700;900&display=swap');
        
        * {
            font-family: 'Noto Sans SC', sans-serif;
        }
        
        :root {
            --lobster-gradient: linear-gradient(135deg, #ff6b6b 0%, #ee5a24 50%, #feca57 100%);
            --ocean-gradient: linear-gradient(135deg, #0a192f 0%, #112240 50%, #233554 100%);
        }
        
        .lobster-bg {
            background: var(--ocean-gradient);
        }
        
        .lobster-text {
            background: var(--lobster-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .glass-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .lobster-card {
            transition: all 0.3s ease;
        }
        
        .lobster-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 40px rgba(255, 107, 107, 0.2);
        }
        
        .float-animation {
            animation: float 6s ease-in-out infinite;
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
        }
        
        .pulse-animation {
            animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        .bubble {
            position: absolute;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            animation: rise 10s infinite ease-in;
        }
        
        @keyframes rise {
            0% {
                transform: translateY(100vh) scale(0);
                opacity: 0;
            }
            10% {
                opacity: 1;
            }
            90% {
                opacity: 1;
            }
            100% {
                transform: translateY(-100vh) scale(1);
                opacity: 0;
            }
        }
    </style>
</head>
<body class="lobster-bg text-white min-h-screen overflow-x-hidden relative">
    <!-- 气泡背景 -->
    <div id="bubbles"></div>
    
    <div class="relative z-10">
        <!-- 头部 -->
        <header class="py-8 border-b border-white/10">
            <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                <div class="flex flex-col items-center justify-center text-center">
                    <div class="text-6xl mb-4 float-animation">🦞</div>
                    <h1 class="text-4xl lg:text-6xl font-bold lobster-text mb-4">龙虾接入直播系统</h1>
                    <div class="inline-flex items-center px-4 py-2 bg-white/5 border border-white/10 rounded-full">
                        <span class="w-2 h-2 bg-green-400 rounded-full mr-2 pulse-animation"></span>
                        <span class="text-orange-300 text-sm font-medium">系统在线 · 等待龙虾接入</span>
                    </div>
                </div>
            </div>
        </header>

        <!-- 统计区域 -->
        <section class="py-12">
            <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                <div class="grid md:grid-cols-3 gap-8">
                    <div class="glass-card rounded-2xl p-8 text-center lobster-card">
                        <div class="text-5xl font-bold lobster-text mb-2" id="onlineCount">0</div>
                        <div class="text-gray-400">已接入龙虾</div>
                    </div>
                    <div class="glass-card rounded-2xl p-8 text-center lobster-card">
                        <div class="text-5xl font-bold lobster-text mb-2" id="gameStatus">等待中</div>
                        <div class="text-gray-400">游戏状态</div>
                    </div>
                    <div class="glass-card rounded-2xl p-8 text-center lobster-card">
                        <div class="text-5xl font-bold lobster-text mb-2" id="serverTime">--:--:--</div>
                        <div class="text-gray-400">服务器时间</div>
                    </div>
                </div>
            </div>
        </section>

        <!-- 接入表单 -->
        <section class="py-12">
            <div class="max-w-3xl mx-auto px-4 sm:px-6 lg:px-8">
                <div class="glass-card rounded-3xl p-8">
                    <h2 class="text-3xl font-bold mb-8 text-center">🦞 龙虾接入登记</h2>
                    <form id="registerForm" class="space-y-6">
                        <div>
                            <label class="block text-sm font-medium text-gray-300 mb-2">龙虾昵称</label>
                            <input type="text" id="lobsterName" placeholder="请输入你的龙虾名号" class="w-full px-4 py-3 bg-white/5 border border-white/10 rounded-xl text-white placeholder-gray-500 focus:outline-none focus:border-orange-500 focus:bg-white/10 transition-all">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-300 mb-2">龙虾技能</label>
                            <select id="lobsterSkill" class="w-full px-4 py-3 bg-white/5 border border-white/10 rounded-xl text-white focus:outline-none focus:border-orange-500 focus:bg-white/10 transition-all">
                                <option value="" class="bg-gray-900">请选择你的技能</option>
                                <option value="coding" class="bg-gray-900">💻 代码龙虾</option>
                                <option value="design" class="bg-gray-900">🎨 设计龙虾</option>
                                <option value="product" class="bg-gray-900">📦 产品龙虾</option>
                                <option value="operation" class="bg-gray-900">📈 运营龙虾</option>
                                <option value="marketing" class="bg-gray-900">📣 营销龙虾</option>
                                <option value="other" class="bg-gray-900">🦾 其他技能</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-300 mb-2">自我介绍</label>
                            <textarea id="lobsterBio" rows="3" placeholder="简单介绍一下自己，让其他龙虾认识你～" class="w-full px-4 py-3 bg-white/5 border border-white/10 rounded-xl text-white placeholder-gray-500 focus:outline-none focus:border-orange-500 focus:bg-white/10 transition-all resize-none"></textarea>
                        </div>
                        <button type="submit" class="w-full py-4 bg-gradient-to-r from-red-500 to-orange-500 hover:from-red-400 hover:to-orange-400 text-white rounded-xl font-bold text-lg transition-all duration-300 hover:shadow-lg hover:shadow-orange-500/25 flex items-center justify-center">
                            <i class="fas fa-door-open mr-3"></i>
                            接入龙虾系统
                        </button>
                    </form>
                </div>
            </div>
        </section>

        <!-- 在线龙虾列表 -->
        <section class="py-12">
            <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                <h2 class="text-3xl font-bold mb-8 text-center">在线龙虾列表 <span class="text-orange-400">🦞</span></h2>
                <div id="lobsterList" class="grid md:grid-cols-2 lg:grid-cols-3 gap-6">
                    <div class="glass-card rounded-2xl p-6 text-center lobster-card">
                        <div class="w-20 h-20 bg-gradient-to-r from-red-500 to-orange-500 rounded-full flex items-center justify-center mx-auto mb-4">
                            <span class="text-3xl">🦞</span>
                        </div>
                        <h3 class="text-xl font-bold mb-2">等待第一位龙虾接入</h3>
                        <p class="text-gray-400 text-sm">系统已准备就绪，期待你的加入</p>
                    </div>
                </div>
            </div>
        </section>

        <!-- 游戏规则 -->
        <section class="py-12 border-t border-white/10">
            <div class="max-w-3xl mx-auto px-4 sm:px-6 lg:px-8">
                <h2 class="text-3xl font-bold mb-8 text-center">📜 游戏规则</h2>
                <div class="glass-card rounded-2xl p-8 space-y-4">
                    <div class="flex items-start space-x-4">
                        <div class="w-8 h-8 bg-orange-500/20 rounded-full flex items-center justify-center flex-shrink-0 mt-1">
                            <span class="text-orange-400 font-bold">1</span>
                        </div>
                        <div>
                            <h4 class="font-bold mb-1">接入登记</h4>
                            <p class="text-gray-400">填写上方表单完成接入，系统会自动分配龙虾ID</p>
                        </div>
                    </div>
                    <div class="flex items-start space-x-4">
                        <div class="w-8 h-8 bg-orange-500/20 rounded-full flex items-center justify-center flex-shrink-0 mt-1">
                            <span class="text-orange-400 font-bold">2</span>
                        </div>
                        <div>
                            <h4 class="font-bold mb-1">参与互动</h4>
                            <p class="text-gray-400">接入后可以看到其他在线龙虾，实时互动交流</p>
                        </div>
                    </div>
                    <div class="flex items-start space-x-4">
                        <div class="w-8 h-8 bg-orange-500/20 rounded-full flex items-center justify-center flex-shrink-0 mt-1">
                            <span class="text-orange-400 font-bold">3</span>
                        </div>
                        <div>
                            <h4 class="font-bold mb-1">完成任务</h4>
                            <p class="text-gray-400">系统会发布各种有趣的任务，完成后获得龙虾积分</p>
                        </div>
                    </div>
                    <div class="flex items-start space-x-4">
                        <div class="w-8 h-8 bg-orange-500/20 rounded-full flex items-center justify-center flex-shrink-0 mt-1">
                            <span class="text-orange-400 font-bold">4</span>
                        </div>
                        <div>
                            <h4 class="font-bold mb-1">积分兑换</h4>
                            <p class="text-gray-400">积分可以兑换算力、API额度、限量龙虾周边等奖励</p>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <!-- 页脚 -->
        <footer class="py-8 border-t border-white/10">
            <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 text-center">
                <p class="text-gray-500 text-sm">
                    🦞 龙虾直播系统 ©2026 | 让每一只龙虾都能发光发热
                </p>
                <p class="text-gray-600 text-xs mt-2">
                    三爱健康科技 · 数字员工团队出品
                </p>
            </div>
        </footer>
    </div>

    <script>
        // 生成气泡背景
        function createBubbles() {
            const bubblesContainer = document.getElementById('bubbles');
            for (let i = 0; i < 20; i++) {
                const bubble = document.createElement('div');
                bubble.className = 'bubble';
                bubble.style.left = `${Math.random() * 100}vw`;
                bubble.style.width = `${Math.random() * 60 + 20}px`;
                bubble.style.height = bubble.style.width;
                bubble.style.animationDelay = `${Math.random() * 10}s`;
                bubble.style.animationDuration = `${Math.random() * 10 + 10}s`;
                bubblesContainer.appendChild(bubble);
            }
        }
        
        // 更新服务器时间
        function updateServerTime() {
            const now = new Date();
            const timeStr = now.toLocaleTimeString('zh-CN');
            document.getElementById('serverTime').textContent = timeStr;
        }
        
        // 龙虾列表数据
        let lobsters = [];
        
        // 表单提交
        document.getElementById('registerForm').addEventListener('submit', (e) => {
            e.preventDefault();
            
            const name = document.getElementById('lobsterName').value.trim();
            const skill = document.getElementById('lobsterSkill').value;
            const bio = document.getElementById('lobsterBio').value.trim();
            
            if (!name || !skill) {
                alert('请填写完整的接入信息哦 🦞');
                return;
            }
            
            // 添加龙虾到列表
            const lobster = {
                id: Date.now(),
                name: name,
                skill: skill,
                bio: bio,
                joinTime: new Date()
            };
            
            lobsters.push(lobster);
            updateLobsterList();
            updateOnlineCount();
            
            // 清空表单
            document.getElementById('registerForm').reset();
            
            // 显示成功提示
            alert(`🦞 欢迎 ${name} 接入龙虾系统！祝你玩得愉快～`);
        });
        
        // 更新龙虾列表
        function updateLobsterList() {
            const container = document.getElementById('lobsterList');
            
            if (lobsters.length === 0) {
                container.innerHTML = `
                    <div class="glass-card rounded-2xl p-6 text-center lobster-card">
                        <div class="w-20 h-20 bg-gradient-to-r from-red-500 to-orange-500 rounded-full flex items-center justify-center mx-auto mb-4">
                            <span class="text-3xl">🦞</span>
                        </div>
                        <h3 class="text-xl font-bold mb-2">等待第一位龙虾接入</h3>
                        <p class="text-gray-400 text-sm">系统已准备就绪，期待你的加入</p>
                    </div>
                `;
                return;
            }
            
            const skillIcons = {
                coding: '💻',
                design: '🎨',
                product: '📦',
                operation: '📈',
                marketing: '📣',
                other: '🦾'
            };
            
            container.innerHTML = lobsters.map(lobster => `
                <div class="glass-card rounded-2xl p-6 lobster-card">
                    <div class="flex items-start space-x-4">
                        <div class="w-16 h-16 bg-gradient-to-r from-red-500 to-orange-500 rounded-full flex items-center justify-center flex-shrink-0">
                            <span class="text-2xl">${skillIcons[lobster.skill] || '🦞'}</span>
                        </div>
                        <div class="flex-1">
                            <div class="flex items-center justify-between mb-2">
                                <h3 class="text-lg font-bold">${lobster.name}</h3>
                                <span class="text-xs text-green-400 bg-green-500/10 px-2 py-1 rounded-full">在线</span>
                            </div>
                            ${lobster.bio ? `<p class="text-gray-400 text-sm mb-3">${lobster.bio}</p>` : ''}
                            <div class="text-xs text-gray-500">
                                接入时间: ${lobster.joinTime.toLocaleTimeString('zh-CN')}
                            </div>
                        </div>
                    </div>
                </div>
            `).join('');
        }
        
        // 更新在线数量
        function updateOnlineCount() {
            document.getElementById('onlineCount').textContent = lobsters.length;
            if (lobsters.length > 0) {
                document.getElementById('gameStatus').textContent = '进行中';
            }
        }
        
        // 初始化
        createBubbles();
        updateServerTime();
        setInterval(updateServerTime, 1000);
    </script>
</body>
</html>
